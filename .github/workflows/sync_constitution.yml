name: Sync Constitution

on:
  push:
    branches:
      - main
    paths:
      - 'promptkit/AGENTS.md'
      - 'scripts/sync_agents.py'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Run Sync Script
        run: python scripts/sync_agents.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # Force add in case they are new/ignored
          git add .gemini/GEMINI.md CLAUDE.md OPENCODE_RULES.md .codex/config.md .theia/ai-context.md .github/copilot-instructions.md
          # Remove old cursorrules if it exists in git index
          git rm --cached .cursorrules || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: Auto-sync agent constitutions [skip ci]" && git push)